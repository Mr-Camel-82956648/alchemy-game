<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>卡牌尺寸调参工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    height: 100vh;
}

.preview-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 20px;
    min-width: 0;
}

.section-title {
    color: #ffcc66;
    font-size: 16px;
    margin: 16px 0 8px;
    border-bottom: 1px solid #444;
    padding-bottom: 4px;
}

.page-preview {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #111;
    border: 2px solid #555;
    border-radius: 4px;
    margin-bottom: 20px;
}
.page-preview > img.bg {
    width: 100%; height: 100%;
    object-fit: cover;
}

/* Loadout simulation */
.sim-loadout-container {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 6%;
}
.sim-loadout-top {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 16px;
}
.sim-loadout-slot {
    position: relative;
}
.sim-loadout-slot img.frame { width: 100%; height: auto; display: block; }
.sim-loadout-slot .inner {
    position: absolute;
    top: 12%; left: 19%; right: 19%; bottom: 38%;
    background: rgba(0,0,0,0.4);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
}
.sim-loadout-slot .inner img.thumb {
    width: 100%; height: 100%;
    object-fit: cover;
}
.sim-loadout-slot .inner .key {
    font-size: 22px; font-weight: bold;
    color: rgba(200,180,140,0.5);
}
.sim-grid-area {
    width: 100%;
    display: flex;
    justify-content: center;
}
.sim-grid {
    display: grid;
    gap: 6px;
}
.sim-grid-item {
    position: relative;
}
.sim-grid-item img.frame { width: 100%; height: auto; display: block; }
.sim-grid-item .inner {
    position: absolute;
    top: 12%; left: 19%; right: 19%; bottom: 38%;
    background: rgba(0,0,0,0.3);
    border-radius: 2px;
    overflow: hidden;
}
.sim-grid-item .inner img.thumb {
    width: 100%; height: 100%;
    object-fit: cover;
}

/* Collection simulation */
.sim-collection-container {
    position: absolute;
    inset: 0;
    display: flex;
    padding: 60px 30px 30px;
    gap: 20px;
}
.sim-col-preview {
    flex-shrink: 0;
    position: relative;
}
.sim-col-preview img.frame { width: 100%; height: auto; display: block; }
.sim-col-preview .inner {
    position: absolute;
    top: 12%; left: 19%; right: 19%; bottom: 38%;
    background: rgba(0,0,0,0.4);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
}
.sim-col-preview .inner img.thumb { width: 100%; height: 100%; object-fit: cover; }

.sim-col-grid-area {
    flex: 1;
    overflow-y: auto;
}
.sim-col-grid {
    display: grid;
    gap: 10px;
}
.sim-col-grid-item {
    position: relative;
}
.sim-col-grid-item img.frame { width: 100%; height: auto; display: block; }
.sim-col-grid-item .inner {
    position: absolute;
    top: 12%; left: 19%; right: 19%; bottom: 38%;
    background: rgba(0,0,0,0.3);
    border-radius: 2px;
    overflow: hidden;
}
.sim-col-grid-item .inner img.thumb { width: 100%; height: 100%; object-fit: cover; }

/* Controls panel */
.controls {
    width: 360px;
    background: #252525;
    padding: 20px;
    overflow-y: auto;
    border-left: 1px solid #444;
    flex-shrink: 0;
}
.controls h2 {
    margin-bottom: 12px;
    color: #ffcc66;
    font-size: 18px;
}
.control-group {
    margin-bottom: 16px;
    padding: 10px;
    background: #2d2d2d;
    border-radius: 8px;
    border: 1px solid #3a3a3a;
}
.control-group h3 {
    margin-bottom: 8px;
    color: #aaa;
    font-size: 14px;
}
.control-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 6px;
}
.control-row label {
    width: 80px;
    font-size: 12px;
    color: #ccc;
    flex-shrink: 0;
}
.control-row input[type="range"] {
    flex: 1;
    accent-color: #ffcc66;
}
.control-row .value {
    width: 55px;
    text-align: right;
    font-size: 12px;
    font-family: 'Consolas', monospace;
    color: #ffcc66;
    flex-shrink: 0;
}
.output-box {
    margin-top: 12px;
    padding: 10px;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 6px;
    font-family: 'Consolas', monospace;
    font-size: 11px;
    white-space: pre-wrap;
    line-height: 1.5;
    color: #8f8;
    user-select: all;
    max-height: 300px;
    overflow-y: auto;
}
.copy-btn {
    margin-top: 8px;
    padding: 8px 16px;
    background: #ffcc66;
    color: #1a1a1a;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-size: 13px;
    width: 100%;
}
.copy-btn:hover { background: #ffd980; }
.hint {
    margin-top: 10px;
    font-size: 11px;
    color: #777;
    line-height: 1.5;
}
</style>
</head>
<body>

<div class="preview-area">
    <h3 class="section-title">装备法阵（武器库）</h3>
    <div class="page-preview" id="loadout-preview">
        <img class="bg" src="../assets/bg/alchemy-room.webp" alt="">
        <div class="sim-loadout-container">
            <div class="sim-loadout-top" id="loadout-top"></div>
            <div class="sim-grid-area">
                <div class="sim-grid" id="loadout-grid"></div>
            </div>
        </div>
    </div>

    <h3 class="section-title">我的法阵（收藏夹）</h3>
    <div class="page-preview" id="collection-preview">
        <img class="bg" src="../assets/bg/alchemy-room.webp" alt="">
        <div class="sim-collection-container">
            <div class="sim-col-preview" id="col-preview-card"></div>
            <div class="sim-col-grid-area">
                <div class="sim-col-grid" id="col-grid"></div>
            </div>
        </div>
    </div>
</div>

<div class="controls">
    <h2>装备法阵参数</h2>

    <div class="control-group">
        <h3>顶部装备槽</h3>
        <div class="control-row">
            <label>槽宽度 (px)</label>
            <input type="range" id="lo-slot-w" min="120" max="360" step="2" value="240">
            <span class="value" id="lo-slot-w-val">240</span>
        </div>
        <div class="control-row">
            <label>槽间距 (px)</label>
            <input type="range" id="lo-slot-gap" min="4" max="60" step="2" value="20">
            <span class="value" id="lo-slot-gap-val">20</span>
        </div>
    </div>

    <div class="control-group">
        <h3>下方网格</h3>
        <div class="control-row">
            <label>每行列数</label>
            <input type="range" id="lo-cols" min="4" max="10" step="1" value="7">
            <span class="value" id="lo-cols-val">7</span>
        </div>
        <div class="control-row">
            <label>网格间距 (px)</label>
            <input type="range" id="lo-grid-gap" min="2" max="24" step="1" value="10">
            <span class="value" id="lo-grid-gap-val">10</span>
        </div>
        <div class="control-row">
            <label>最大宽度 (px)</label>
            <input type="range" id="lo-grid-maxw" min="500" max="1400" step="10" value="860">
            <span class="value" id="lo-grid-maxw-val">860</span>
        </div>
    </div>

    <h2 style="margin-top: 16px;">我的法阵参数</h2>

    <div class="control-group">
        <h3>左侧预览卡</h3>
        <div class="control-row">
            <label>宽度 (px)</label>
            <input type="range" id="col-prev-w" min="150" max="500" step="5" value="320">
            <span class="value" id="col-prev-w-val">320</span>
        </div>
    </div>

    <div class="control-group">
        <h3>右侧卡牌网格</h3>
        <div class="control-row">
            <label>每行列数</label>
            <input type="range" id="col-cols" min="3" max="8" step="1" value="5">
            <span class="value" id="col-cols-val">5</span>
        </div>
        <div class="control-row">
            <label>网格间距 (px)</label>
            <input type="range" id="col-gap" min="4" max="30" step="1" value="16">
            <span class="value" id="col-gap-val">16</span>
        </div>
    </div>

    <h2 style="margin-top: 16px;">输出 CSS</h2>
    <div class="output-box" id="output"></div>
    <button class="copy-btn" onclick="copyCSS()">复制 CSS 参数</button>

    <p class="hint">
        拖动滑条实时预览。<br>
        上方两个预览框模拟实际 1920×1080 布局。<br>
        调整满意后"复制 CSS 参数"发给我即可。
    </p>
</div>

<script>
const FRAME = '../assets/ui/card-frame.webp';
const THUMBS = [
    '../assets/thumbnails/thumb_00.webp',
    '../assets/thumbnails/thumb_01.webp',
    '../assets/thumbnails/thumb_02.webp',
    '../assets/thumbnails/thumb_03.webp',
    '../assets/thumbnails/thumb_04.webp',
    '../assets/thumbnails/thumb_05.webp',
    '../assets/thumbnails/thumb_06.webp',
    '../assets/thumbnails/thumb_07.webp',
    '../assets/thumbnails/thumb_08.webp',
    '../assets/thumbnails/thumb_09.webp',
    '../assets/thumbnails/thumb_10.webp',
    '../assets/thumbnails/thumb_11.webp',
    '../assets/thumbnails/thumb_12.webp',
    '../assets/thumbnails/thumb_13.webp'
];

const REF_W = 1920, REF_H = 1080;

function makeSlot(thumbIdx, keyLabel) {
    const el = document.createElement('div');
    el.className = 'sim-loadout-slot';
    const f = document.createElement('img');
    f.className = 'frame';
    f.src = FRAME;
    el.appendChild(f);
    const inner = document.createElement('div');
    inner.className = 'inner';
    if (thumbIdx !== null && THUMBS[thumbIdx]) {
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = THUMBS[thumbIdx];
        inner.appendChild(img);
    } else {
        const k = document.createElement('span');
        k.className = 'key';
        k.textContent = keyLabel || '+';
        inner.appendChild(k);
    }
    el.appendChild(inner);
    return el;
}

function makeGridItem(thumbIdx) {
    const el = document.createElement('div');
    el.className = 'sim-grid-item';
    const f = document.createElement('img');
    f.className = 'frame';
    f.src = FRAME;
    el.appendChild(f);
    const inner = document.createElement('div');
    inner.className = 'inner';
    if (THUMBS[thumbIdx]) {
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = THUMBS[thumbIdx];
        inner.appendChild(img);
    }
    el.appendChild(inner);
    return el;
}

function makeColGridItem(thumbIdx) {
    const el = document.createElement('div');
    el.className = 'sim-col-grid-item';
    const f = document.createElement('img');
    f.className = 'frame';
    f.src = FRAME;
    el.appendChild(f);
    const inner = document.createElement('div');
    inner.className = 'inner';
    if (THUMBS[thumbIdx]) {
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = THUMBS[thumbIdx];
        inner.appendChild(img);
    }
    el.appendChild(inner);
    return el;
}

function getScale() {
    const box = document.getElementById('loadout-preview');
    return box.clientWidth / REF_W;
}

const sliders = {};
const valEls = {};
['lo-slot-w', 'lo-slot-gap', 'lo-cols', 'lo-grid-gap', 'lo-grid-maxw',
 'col-prev-w', 'col-cols', 'col-gap'].forEach(id => {
    sliders[id] = document.getElementById(id);
    valEls[id] = document.getElementById(id + '-val');
    sliders[id].addEventListener('input', render);
});

function render() {
    const s = getScale();

    const loSlotW = parseInt(sliders['lo-slot-w'].value);
    const loSlotGap = parseInt(sliders['lo-slot-gap'].value);
    const loCols = parseInt(sliders['lo-cols'].value);
    const loGridGap = parseInt(sliders['lo-grid-gap'].value);
    const loGridMaxW = parseInt(sliders['lo-grid-maxw'].value);
    const colPrevW = parseInt(sliders['col-prev-w'].value);
    const colCols = parseInt(sliders['col-cols'].value);
    const colGap = parseInt(sliders['col-gap'].value);

    valEls['lo-slot-w'].textContent = loSlotW;
    valEls['lo-slot-gap'].textContent = loSlotGap;
    valEls['lo-cols'].textContent = loCols;
    valEls['lo-grid-gap'].textContent = loGridGap;
    valEls['lo-grid-maxw'].textContent = loGridMaxW;
    valEls['col-prev-w'].textContent = colPrevW;
    valEls['col-cols'].textContent = colCols;
    valEls['col-gap'].textContent = colGap;

    // --- Loadout top slots ---
    const top = document.getElementById('loadout-top');
    top.innerHTML = '';
    top.style.gap = (loSlotGap * s) + 'px';
    for (let i = 0; i < 4; i++) {
        const slot = makeSlot(i, String(i + 1));
        slot.style.width = (loSlotW * s) + 'px';
        top.appendChild(slot);
    }

    // --- Loadout grid ---
    const grid = document.getElementById('loadout-grid');
    grid.innerHTML = '';
    grid.style.gridTemplateColumns = `repeat(${loCols}, 1fr)`;
    grid.style.gap = (loGridGap * s) + 'px';
    grid.style.maxWidth = (loGridMaxW * s) + 'px';
    grid.style.width = (loGridMaxW * s) + 'px';
    for (let i = 0; i < loCols * 2; i++) {
        grid.appendChild(makeGridItem(i % THUMBS.length));
    }

    // --- Collection preview card ---
    const colPrev = document.getElementById('col-preview-card');
    colPrev.innerHTML = '';
    colPrev.style.width = (colPrevW * s) + 'px';
    const prevSlot = document.createElement('div');
    prevSlot.style.position = 'relative';
    const pf = document.createElement('img');
    pf.className = 'frame';
    pf.src = FRAME;
    pf.style.width = '100%';
    pf.style.height = 'auto';
    prevSlot.appendChild(pf);
    const pi = document.createElement('div');
    pi.className = 'inner';
    const pt = document.createElement('img');
    pt.className = 'thumb';
    pt.src = THUMBS[0];
    pi.appendChild(pt);
    prevSlot.appendChild(pi);
    colPrev.appendChild(prevSlot);

    // --- Collection grid ---
    const colGrid = document.getElementById('col-grid');
    colGrid.innerHTML = '';
    colGrid.style.gridTemplateColumns = `repeat(${colCols}, 1fr)`;
    colGrid.style.gap = (colGap * s) + 'px';
    for (let i = 0; i < colCols * 3; i++) {
        colGrid.appendChild(makeColGridItem(i % THUMBS.length));
    }

    // --- Output CSS ---
    document.getElementById('output').textContent =
`/* 装备法阵 - 武器库 */
.loadout-slot { width: ${loSlotW}px; }
.loadout-slots { gap: ${loSlotGap}px; }
.loadout-grid-area { max-width: ${loGridMaxW}px; }
.loadout-grid-area .card-grid {
    grid-template-columns: repeat(${loCols}, 1fr);
    gap: ${loGridGap}px;
}

/* 我的法阵 - 收藏夹 */
.preview-card { width: ${colPrevW}px; }
.card-grid {
    grid-template-columns: repeat(${colCols}, 1fr);
    gap: ${colGap}px;
}`;
}

function copyCSS() {
    const text = document.getElementById('output').textContent;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '已复制 ✓';
        setTimeout(() => btn.textContent = '复制 CSS 参数', 1500);
    });
}

window.addEventListener('resize', render);
render();
</script>
</body>
</html>
