<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>卡槽位置调参工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    height: 100vh;
}

.preview-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    min-width: 0;
}

.game-container {
    position: relative;
    width: 100%;
    max-width: calc(100vh * 16 / 9 - 20px);
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #000;
    border: 2px solid #555;
}

.game-container > img.bg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
}

.card-slot {
    position: absolute;
    pointer-events: none;
}
.card-slot img {
    width: 100%;
    height: auto;
    display: block;
}
.card-slot .inner-marker {
    position: absolute;
    top: 13%;
    left: 20%;
    right: 20%;
    bottom: 38%;
    border: 2px solid rgba(255, 0, 0, 0.8);
    background: rgba(255, 0, 0, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: rgba(255, 255, 255, 0.5);
    font-weight: 200;
}

.controls {
    width: 340px;
    background: #252525;
    padding: 20px;
    overflow-y: auto;
    border-left: 1px solid #444;
    flex-shrink: 0;
}

.controls h2 {
    margin-bottom: 16px;
    color: #ffcc66;
    font-size: 18px;
}

.control-group {
    margin-bottom: 20px;
    padding: 12px;
    background: #2d2d2d;
    border-radius: 8px;
    border: 1px solid #3a3a3a;
}

.control-group h3 {
    margin-bottom: 10px;
    color: #aaa;
    font-size: 14px;
}

.control-row {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    gap: 8px;
}

.control-row label {
    width: 50px;
    font-size: 13px;
    color: #ccc;
    flex-shrink: 0;
}

.control-row input[type="range"] {
    flex: 1;
    accent-color: #ffcc66;
}

.control-row .value {
    width: 55px;
    text-align: right;
    font-size: 13px;
    font-family: 'Consolas', monospace;
    color: #ffcc66;
    flex-shrink: 0;
}

.link-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
    font-size: 13px;
    color: #aaa;
}

.link-toggle input { accent-color: #ffcc66; }

.output-box {
    margin-top: 16px;
    padding: 12px;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 6px;
    font-family: 'Consolas', monospace;
    font-size: 12px;
    white-space: pre;
    line-height: 1.6;
    color: #8f8;
    user-select: all;
}

.copy-btn {
    margin-top: 8px;
    padding: 8px 16px;
    background: #ffcc66;
    color: #1a1a1a;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-size: 13px;
    width: 100%;
}
.copy-btn:hover { background: #ffd980; }

.hint {
    margin-top: 12px;
    font-size: 11px;
    color: #777;
    line-height: 1.5;
}
</style>
</head>
<body>

<div class="preview-area">
    <div class="game-container" id="gameContainer">
        <img class="bg" src="../assets/bg/alchemy-room.webp" alt="bg">
        <div class="card-slot" id="slotA">
            <img src="../assets/ui/card-frame.webp" alt="frame A">
            <div class="inner-marker">+</div>
        </div>
        <div class="card-slot" id="slotB">
            <img src="../assets/ui/card-frame.webp" alt="frame B">
            <div class="inner-marker">+</div>
        </div>
    </div>
</div>

<div class="controls">
    <h2>卡槽位置调参</h2>

    <div class="control-group">
        <h3>卡槽 A（左）</h3>
        <div class="control-row">
            <label>left</label>
            <input type="range" id="a-left" min="0" max="60" step="0.1" value="30.5">
            <span class="value" id="a-left-val">30.5%</span>
        </div>
        <div class="control-row">
            <label>top</label>
            <input type="range" id="a-top" min="0" max="60" step="0.1" value="14.5">
            <span class="value" id="a-top-val">14.5%</span>
        </div>
    </div>

    <div class="control-group">
        <h3>卡槽 B（右）</h3>
        <div class="control-row">
            <label>left</label>
            <input type="range" id="b-left" min="20" max="80" step="0.1" value="48.5">
            <span class="value" id="b-left-val">48.5%</span>
        </div>
        <div class="control-row">
            <label>top</label>
            <input type="range" id="b-top" min="0" max="60" step="0.1" value="14.5">
            <span class="value" id="b-top-val">14.5%</span>
        </div>
        <div class="link-toggle">
            <input type="checkbox" id="link-top" checked>
            <label for="link-top">A / B 的 top 联动</label>
        </div>
    </div>

    <div class="control-group">
        <h3>共用参数</h3>
        <div class="control-row">
            <label>宽度</label>
            <input type="range" id="slot-width" min="5" max="25" step="0.1" value="12">
            <span class="value" id="slot-width-val">12.0%</span>
        </div>
    </div>

    <h2>输出 CSS</h2>
    <div class="output-box" id="output"></div>
    <button class="copy-btn" onclick="copyCSS()">复制 CSS</button>

    <p class="hint">
        拖动滑条实时调整位置。<br>
        红色虚线框 = 卡牌内容透明区域。<br>
        "+" 号应在红框正中间。<br>
        调好后点"复制 CSS"把参数给我。
    </p>
</div>

<script>
const slotA = document.getElementById('slotA');
const slotB = document.getElementById('slotB');

const controls = {
    aLeft:  document.getElementById('a-left'),
    aTop:   document.getElementById('a-top'),
    bLeft:  document.getElementById('b-left'),
    bTop:   document.getElementById('b-top'),
    width:  document.getElementById('slot-width'),
    linkTop: document.getElementById('link-top'),
};

const vals = {
    aLeft:  document.getElementById('a-left-val'),
    aTop:   document.getElementById('a-top-val'),
    bLeft:  document.getElementById('b-left-val'),
    bTop:   document.getElementById('b-top-val'),
    width:  document.getElementById('slot-width-val'),
};

function update() {
    const aL = parseFloat(controls.aLeft.value);
    const aT = parseFloat(controls.aTop.value);
    const bL = parseFloat(controls.bLeft.value);
    const bT = parseFloat(controls.bTop.value);
    const w  = parseFloat(controls.width.value);

    slotA.style.left  = aL + '%';
    slotA.style.top   = aT + '%';
    slotA.style.width = w + '%';

    slotB.style.left  = bL + '%';
    slotB.style.top   = bT + '%';
    slotB.style.width = w + '%';

    vals.aLeft.textContent = aL.toFixed(1) + '%';
    vals.aTop.textContent  = aT.toFixed(1) + '%';
    vals.bLeft.textContent = bL.toFixed(1) + '%';
    vals.bTop.textContent  = bT.toFixed(1) + '%';
    vals.width.textContent = w.toFixed(1) + '%';

    document.getElementById('output').textContent =
`.card-slot { width: ${w.toFixed(1)}%; }
#slot-a { left: ${aL.toFixed(1)}%; top: ${aT.toFixed(1)}%; }
#slot-b { left: ${bL.toFixed(1)}%; top: ${bT.toFixed(1)}%; }`;
}

controls.aTop.addEventListener('input', () => {
    if (controls.linkTop.checked) {
        controls.bTop.value = controls.aTop.value;
    }
    update();
});

controls.bTop.addEventListener('input', () => {
    if (controls.linkTop.checked) {
        controls.aTop.value = controls.bTop.value;
    }
    update();
});

controls.aLeft.addEventListener('input', update);
controls.bLeft.addEventListener('input', update);
controls.width.addEventListener('input', update);

update();

function copyCSS() {
    const text = document.getElementById('output').textContent;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '已复制 ✓';
        setTimeout(() => btn.textContent = '复制 CSS', 1500);
    });
}
</script>

</body>
</html>
