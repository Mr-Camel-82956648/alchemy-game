<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>法阵效果对比 (旧背景 vs 当前背景)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #ddd; font: 13px 'Consolas', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.canvases { display: flex; flex: 1; }
canvas { flex: 1; display: block; border-right: 2px solid #444; }
canvas:last-child { border-right: none; }
#panel {
    background: #1a1a1a; padding: 10px 16px; border-top: 1px solid #333;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
}
.group { display: flex; align-items: center; gap: 6px; }
.group label { font-size: 12px; white-space: nowrap; }
.group input[type=range] { width: 100px; }
.group .val { width: 40px; text-align: right; font-size: 11px; color: #aaa; }
select { background: #222; color: #ddd; border: 1px solid #555; padding: 3px 6px; font-size: 12px; }
button { padding: 6px 16px; background: #ff6600; color: #fff; border: none; font: bold 13px Consolas, monospace; cursor: pointer; border-radius: 4px; }
button:hover { background: #ff8833; }
.label-overlay { position: absolute; top: 8px; color: rgba(255,255,255,0.7); font: bold 14px Consolas; pointer-events: none; text-shadow: 0 1px 4px #000; }
</style>
</head>
<body>
<div class="canvases" style="position:relative">
    <canvas id="cv-old"></canvas>
    <canvas id="cv-new"></canvas>
    <div class="label-overlay" style="left:12px">旧背景 (background_behind)</div>
    <div class="label-overlay" style="right:12px; left:auto">当前背景 (multi-layer)</div>
</div>
<div id="panel">
    <div class="group">
        <label>大招</label>
        <select id="spell-select">
            <option value="../assets/videos/effect_01.mp4">effect_01</option>
            <option value="../assets/videos/effect_02.mp4">effect_02</option>
            <option value="../assets/videos/effect_03.mp4">effect_03</option>
            <option value="../assets/videos/20260424062246_e374c5d2.mp4">火焰风暴</option>
            <option value="../assets/videos/20260424062400_322dffa2.mp4">冰霜之刃</option>
            <option value="../assets/videos/20260424074530_0adc48de.mp4">雷电裁决</option>
            <option value="../assets/videos/20260424080112_7b7b10fc.mp4">毒雾缠绕</option>
        </select>
    </div>
    <div class="group"><label>尺寸</label><input type="range" id="r-size" min="200" max="1800" value="1000"><span class="val" id="v-size">1000</span></div>
    <div class="group"><label>Pass1 body α</label><input type="range" id="r-p1" min="0" max="100" value="35"><span class="val" id="v-p1">35</span></div>
    <div class="group"><label>Pass2 lighten α</label><input type="range" id="r-p2" min="0" max="100" value="100"><span class="val" id="v-p2">100</span></div>
    <div class="group"><label>Pass3 additive α</label><input type="range" id="r-p3" min="0" max="100" value="40"><span class="val" id="v-p3">40</span></div>
    <div class="group"><label>Pass3 缩放%</label><input type="range" id="r-p3s" min="20" max="100" value="60"><span class="val" id="v-p3s">60</span></div>
    <div class="group"><label>黑阈值</label><input type="range" id="r-thresh" min="10" max="80" value="40"><span class="val" id="v-thresh">40</span></div>
    <button id="cast-btn">⚡ 释放 (空格)</button>
</div>

<script>
const W = 1920, H = 1080;

const cvOld = document.getElementById('cv-old');
const ctxOld = cvOld.getContext('2d');
const cvNew = document.getElementById('cv-new');
const ctxNew = cvNew.getContext('2d');

// Background images
const bgOld = new Image();
bgOld.src = '../assets/bg/background_behind.webp';

const bgNewAssets = {};
const bgNewFiles = {
    ground: '../assets/aena/seamless_texture_01.jpg',
    skull1: '../assets/aena/skull_01.png',
    skull2: '../assets/aena/skull_02.png',
    light1: '../assets/aena/linear_dodge_add_01.png',
    light2: '../assets/aena/linear_dodge_add_02.png'
};
Object.entries(bgNewFiles).forEach(([k, src]) => {
    const img = new Image();
    img.src = src;
    bgNewAssets[k] = img;
});

// Effect processing
const EFFECT_SIZE = 512;
const procCanvas = document.createElement('canvas');
procCanvas.width = EFFECT_SIZE; procCanvas.height = EFFECT_SIZE;
const procCtx = procCanvas.getContext('2d', { willReadFrequently: true });

function rv(id) { return +document.getElementById(id).value; }

document.querySelectorAll('input[type=range]').forEach(el => {
    const valSpan = document.getElementById('v-' + el.id.slice(2));
    if (valSpan) el.addEventListener('input', () => { valSpan.textContent = el.value; });
});

function processFrame(v) {
    procCtx.clearRect(0, 0, EFFECT_SIZE, EFFECT_SIZE);
    procCtx.drawImage(v, 0, 0, EFFECT_SIZE, EFFECT_SIZE);
    const frame = procCtx.getImageData(0, 0, EFFECT_SIZE, EFFECT_SIZE);
    const d = frame.data;
    const thresh = rv('r-thresh');
    const low = thresh / 4;
    for (let i = 0; i < d.length; i += 4) {
        const avg = (d[i] + d[i + 1] + d[i + 2]) / 3;
        if (avg < thresh) d[i + 3] = avg < low ? 0 : d[i + 3] * ((avg - low) / (thresh - low));
    }
    procCtx.putImageData(frame, 0, 0);
}

let activeSpell = null;

function castSpell() {
    const src = document.getElementById('spell-select').value;
    const vid = document.createElement('video');
    vid.src = src;
    vid.muted = true;
    vid.playsInline = true;
    vid.crossOrigin = 'anonymous';
    vid.play().catch(() => {});
    activeSpell = { video: vid, startTime: performance.now() };
    vid.addEventListener('ended', () => { activeSpell = null; });
}

function drawSpellOn(ctx, now) {
    if (!activeSpell || !activeSpell.video) return;
    const v = activeSpell.video;
    if (v.readyState < 2 || v.ended) return;

    const age = now - activeSpell.startTime;
    const dur = v.duration * 1000 || 3000;
    const fadeOut = dur - 800;
    const alpha = Math.min(Math.min(1, age / 200), Math.max(0, 1 - (age - fadeOut) / 800));
    if (alpha <= 0) return;

    const size = rv('r-size');
    const cx = W / 2, cy = H / 2;
    const half = size / 2;
    const p1a = rv('r-p1') / 100;
    const p2a = rv('r-p2') / 100;
    const p3a = rv('r-p3') / 100;
    const p3s = rv('r-p3s') / 100;

    // Pass 1: body
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = alpha * p1a;
    ctx.drawImage(procCanvas, cx - half, cy - half, size, size);
    ctx.restore();

    // Pass 2: lighten
    ctx.save();
    ctx.globalCompositeOperation = 'lighten';
    ctx.globalAlpha = alpha * p2a;
    ctx.drawImage(procCanvas, cx - half, cy - half, size, size);
    ctx.restore();

    // Pass 3: additive overexpose
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = alpha * p3a;
    const sHalf = half * p3s;
    ctx.drawImage(procCanvas, cx - sHalf, cy - sHalf, size * p3s, size * p3s);
    ctx.restore();
}

function mod(a, n) { return ((a % n) + n) % n; }

function drawNewBg() {
    const now = performance.now();
    ctxNew.fillStyle = '#0a0808';
    ctxNew.fillRect(0, 0, W, H);

    // Ground with brightness/saturation
    const g = bgNewAssets.ground;
    if (g && g.complete && g.naturalWidth) {
        ctxNew.save();
        ctxNew.filter = 'saturate(0.62)';
        const tw = Math.round(g.naturalWidth * 0.55);
        const th = Math.round(g.naturalHeight * 0.55);
        for (let x = 0; x < W; x += tw)
            for (let y = 0; y < H; y += th)
                ctxNew.drawImage(g, x, y, tw, th);
        ctxNew.restore();

        // Brightness overlay
        ctxNew.save();
        ctxNew.globalAlpha = 1 - 0.59;
        ctxNew.fillStyle = '#000';
        ctxNew.fillRect(0, 0, W, H);
        ctxNew.restore();
    }

    // Light orbs
    ctxNew.save();
    ctxNew.globalCompositeOperation = 'lighter';
    const l1 = bgNewAssets.light1, l2 = bgNewAssets.light2;
    if (l1 && l1.complete) {
        ctxNew.globalAlpha = 0.41 + 0.15 * Math.sin(now * 0.0008);
        for (let x = 0; x < W; x += l1.naturalWidth)
            for (let y = 0; y < H; y += l1.naturalHeight)
                ctxNew.drawImage(l1, x, y);
    }
    if (l2 && l2.complete) {
        ctxNew.globalAlpha = 0.31 + 0.15 * Math.sin(now * 0.0006 + 1.5);
        for (let x = 0; x < W; x += l2.naturalWidth)
            for (let y = 0; y < H; y += l2.naturalHeight)
                ctxNew.drawImage(l2, x, y);
    }
    ctxNew.restore();
}

function resize() {
    const availW = window.innerWidth / 2;
    const availH = window.innerHeight - 60;
    const aspect = W / H;
    let cw, ch;
    if (availW / availH > aspect) { ch = availH; cw = ch * aspect; }
    else { cw = availW; ch = cw / aspect; }

    [cvOld, cvNew].forEach(c => {
        c.width = W; c.height = H;
        c.style.width = cw + 'px';
        c.style.height = ch + 'px';
    });
}
window.addEventListener('resize', resize);
resize();

function loop() {
    const now = performance.now();

    // Left: old background
    ctxOld.fillStyle = '#0a0808';
    ctxOld.fillRect(0, 0, W, H);
    if (bgOld.complete && bgOld.naturalWidth) {
        ctxOld.drawImage(bgOld, 0, 0, W, H);
    }

    // Right: new background
    drawNewBg();

    // Process spell frame once, draw on both
    if (activeSpell && activeSpell.video && activeSpell.video.readyState >= 2 && !activeSpell.video.ended) {
        processFrame(activeSpell.video);
        drawSpellOn(ctxOld, now);
        drawSpellOn(ctxNew, now);
    }

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

document.getElementById('cast-btn').addEventListener('click', castSpell);
document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !e.repeat) { e.preventDefault(); castSpell(); }
});
</script>
</body>
</html>
